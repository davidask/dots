[language-server]
oxlint = { command = "npx", args = ["oxlint", "--lsp"] }
oxfmt = { command = "npx", args = ["oxfmt", "--write", "--stdin-filepath"] }
tailwindcss-ls = { command = "tailwindcss-language-server", args = ["--stdio"] }
biome = { command = "npx", args = ["--no-install", "biome", "lsp-proxy"] }
basedpyright = { command = "basedpyright-langserver", args = ["--stdio"] }
sqlls = { command = "sql-language-server", args = ["up", "--method", "stdio"] }


[[language]]
name = "javascript"
language-servers = [ { name = "typescript-language-server", except-features = [ "format" ] }, "tailwindcss-ls", "biome", "oxlint" ]
auto-format = true
formatter = { command = "sh", args = ["-c", "npx oxfmt --stdin-filepath ${FILENAME:-file.tsx}"] }

[[language]]
name = "typescript"
language-servers = [ { name = "typescript-language-server", except-features = [ "format" ] }, "tailwindcss-ls", "biome", "oxlint" ]
auto-format = true
formatter = { command = "sh", args = ["-c", "npx oxfmt --stdin-filepath ${FILENAME:-file.tsx}"] }

[[language]]
name = "tsx"
auto-format = true
language-servers = [ { name = "typescript-language-server", except-features = [ "format" ] }, "tailwindcss-ls", "biome", "oxlint" ]
formatter = { command = "sh", args = ["-c", "npx oxfmt --stdin-filepath ${FILENAME:-file.tsx}"] }

[[language]]
name = "jsx"
auto-format = true
language-servers = [ { name = "typescript-language-server", except-features = [ "format" ] }, "tailwindcss-ls", "biome", "oxlint" ]
formatter = { command = "sh", args = ["-c", "npx oxfmt --stdin-filepath ${FILENAME:-file.tsx}"] }

[[language]]
name = "json"
language-servers = [ { name = "vscode-json-language-server", except-features = [ "format" ] }, "biome" ]

[[language]]
name = "swift"
auto-format = true
language-servers = [ { name = "sourcekit-lsp", except-features = [ "format" ] } ]
formatter = { command = "swiftformat", args = ["--quiet"] }

[[language]]
name = "python"
auto-format = true
language-servers = [ "basedpyright" ]

[[language]]
name = "sql"
auto-format = true
language-servers = [ "sqlls" ]
formatter = { command = "sqlfluff", args = ["format", "-", "--disable-progress-bar"] }
